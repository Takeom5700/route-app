<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今の最適な経路を調べる</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">今の最適な経路を調べる</h1>

    <!-- 入力フォーム -->
    <div class="form">
      <input
        id="input-from"
        class="station-input"
        type="text"
        placeholder="例：海老名"
        autocomplete="off"
        aria-label="出発駅"
      >
      <div class="arrow-between">↓</div>
      <input
        id="input-to"
        class="station-input"
        type="text"
        placeholder="例：渋谷"
        autocomplete="off"
        aria-label="目的駅"
      >
    </div>

    <!-- よく使うルート -->
    <div id="saved-routes" class="saved-routes" aria-label="よく使うルート"></div>

    <!-- 検索ボタン -->
    <button id="search-btn" class="search-btn">今すぐ調べる</button>

    <!-- エラー -->
    <div id="error-msg" class="error-msg" role="alert" hidden>
      経路情報を取得できませんでした。<br>
      駅名を確認してもう一度押してください。<br>
      <span style="font-size:14px;color:#888;">（改善しない場合はしばらく時間をおいてください）</span>
    </div>

    <!-- ローディング -->
    <div id="spinner" class="spinner-wrap" hidden aria-label="検索中">
      <div class="spinner-ring"></div>
    </div>

    <!-- 検索結果 -->
    <div id="results" class="results"></div>

    <!-- ルート保存ボタン（検索後に表示） -->
    <button id="save-btn" class="save-btn" hidden>このルートを保存</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
