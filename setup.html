<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>経路の設定 — 結局どの経路なん？</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="setup-header">
    <a href="index.html" class="back-link" aria-label="戻る">← 戻る</a>
    <h1>経路の設定</h1>
  </header>

  <main>
    <!-- 登録済みルートセット一覧 -->
    <section aria-label="登録済みルートセット">
      <div id="routeset-list"></div>
    </section>

    <button id="add-routeset-btn" type="button" class="btn-add-routeset">
      ＋ 新しいルートセットを追加
    </button>

    <!-- 編集フォーム（アコーディオン） -->
    <div id="edit-form-container" hidden>
      <div class="edit-form-card">
        <h2 id="edit-form-title" class="edit-form-title">ルートセットを追加</h2>

        <div class="form-group">
          <label for="routeset-label">ルートセット名</label>
          <input type="text" id="routeset-label" placeholder="例：家→会社" />
        </div>

        <div id="candidates-container"></div>

        <div class="form-actions">
          <button id="save-routeset-btn" type="button" class="btn-save">保存する</button>
          <button id="cancel-edit-btn" type="button" class="btn-cancel">キャンセル</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/setup.js"></script>
</body>
</html>
